name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    # Backend checks
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
    - name: Lint backend with ruff
      run: ruff check backend/app
    
    # Frontend checks
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
    - name: Compile/Build frontend
      run: |
        cd frontend
        npm run build

  backend-tests:
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
    - name: Run tests
      run: |
        cd backend
        pytest

  docker-build-and-security:
    needs: backend-tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    # Codebase Security Scan
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    # Verify Docker container packaging works
    - name: Build Backend Docker Image
      run: |
        docker build -t cloudcopilot-backend:latest ./backend
    - name: Build Frontend Docker Image
      run: |
        docker build -t cloudcopilot-frontend:latest ./frontend
